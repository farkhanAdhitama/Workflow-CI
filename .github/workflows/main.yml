name: Train Model

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Debug - List files
        run: |
          echo "Current directory:"
          pwd
          echo "Files in current directory:"
          ls -la
          echo "Python files:"
          find . -name "*.py" || echo "No Python files found"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas joblib

      #  Run as a mlflow project
      - name: Run mlflow project (no-conda)
        run: |
          mlflow run . --no-conda

      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            *.joblib
            *.json
